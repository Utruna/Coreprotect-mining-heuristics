name: XRayGateway
version: '0.2.0'
main: net.utruna.xrayindexer.GatewayPlugin
api-version: '1.21'
description: >
  Passerelle HTTP en lecture seule au-dessus de la base CoreProtect. Sert des
  tranches brutes de co_block (paginées par rowid) et les tables de
  correspondance, en CSV gzippé, pour un pipeline d'analyse x-ray déporté.
  N'écrit jamais dans le fichier CoreProtect.
authors: [Utruna]

commands:
  xraygateway:
    description: État de la passerelle (tête rowid de co_block).
    usage: /xraygateway
    permission: xraygateway.admin
    permission-message: "Permission manquante : xraygateway.admin"

permissions:
  xraygateway.admin:
    description: Autorise la consultation de l'état de la passerelle.
    default: op
